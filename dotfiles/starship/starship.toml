# Starship prompt — themed from matugen (generated from starship.toml.in).
# Style: lean/Pure (à la zenities) — single line, no icons, no filler words,
# subtle grey git, coloured ❯. Command time is right-aligned.
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
palette = "wallpaper"
# NOTE: format/right_format MUST stay above the first [table] header, or TOML
# folds them into that table and starship silently falls back to its default.
format = "$directory$git_branch$git_status$character"
right_format = "$cmd_duration"

[palettes.wallpaper]
primary   = "#ffb2b9"
secondary = "#e5bdbf"
tertiary  = "#e8c08e"
error     = "#ffb4ab"
muted     = "#9f8c8d"
text      = "#f0dedf"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "primary"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ""
read_only = " "
read_only_style = "error"

[git_branch]
format = "[$branch]($style) "
symbol = ""
style = "muted"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "muted"
conflicted = "="
untracked = "?"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "≡"
ahead = "⇡"
behind = "⇣"
diverged = "⇕"

[cmd_duration]
min_time = 500
style = "muted"
format = "[ $duration]($style)"

[character]
success_symbol = "[❯](primary)"
error_symbol = "[❯](error)"
vimcmd_symbol = "[❮](secondary)"
