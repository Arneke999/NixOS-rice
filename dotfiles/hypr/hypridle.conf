# hypridle — idle -> lock. Drives the lock through logind (loginctl lock-session)
# so the same path works on Hyprland AND Arch: hypridle listens for the logind
# Lock signal and runs lock_cmd. (Hyprland implements hyprland-lock-notify-v1, so
# hyprlock also gets a native locked hint here — no resume-from-suspend flash.)

general {
    lock_cmd = pidof hyprlock || hyprlock   # avoid spawning a second instance
    before_sleep_cmd = loginctl lock-session # lock before the system suspends
    after_sleep_cmd = hyprctl dispatch dpms on  # ensure monitors wake on resume
    ignore_dbus_inhibit = false              # respect apps that inhibit idle
}

# Lock after 5 minutes idle.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn the monitors off a minute after locking (Hyprland DPMS); any input wakes them.
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
