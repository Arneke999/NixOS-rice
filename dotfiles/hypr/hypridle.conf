# hypridle — idle -> lock. Drives the lock through logind (loginctl lock-session)
# rather than the hypr lock-notify protocol, because Niri doesn't implement
# hyprland-lock-notify-v1; going via logind means Niri reports the locked hint
# over dbus and avoids the resume-from-suspend flash. hypridle listens for the
# logind Lock signal and runs lock_cmd.

general {
    lock_cmd = pidof hyprlock || hyprlock   # avoid spawning a second instance
    before_sleep_cmd = loginctl lock-session # lock before the system suspends
    ignore_dbus_inhibit = false              # respect apps that inhibit idle
}

# Lock after 5 minutes idle.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Turn the monitors off a minute after locking (Niri DPMS); any input wakes them.
listener {
    timeout = 360
    on-timeout = niri msg action power-off-monitors
    on-resume  = niri msg action power-on-monitors
}
